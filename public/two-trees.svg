<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true">
  <defs>
    <radialGradient id="silverLeaves" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F5F5F5" />
      <stop offset="55%" stop-color="#C0C0C0" />
      <stop offset="100%" stop-color="#8A8A8A" />
    </radialGradient>
    <radialGradient id="goldLeaves" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFE680" />
      <stop offset="55%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8C6B14" />
    </radialGradient>
  </defs>
  <!-- Ground line -->
  <line x1="4" y1="58" x2="60" y2="58" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
  <!-- Left tree: silver -->
  <rect x="16" y="40" width="4" height="18" rx="1.2" fill="#6B4423" />
  <circle cx="18" cy="32" r="12" fill="url(#silverLeaves)" stroke="#6B6B6B" stroke-width="0.75" />
  <!-- Right tree: gold -->
  <rect x="44" y="40" width="4" height="18" rx="1.2" fill="#6B4423" />
  <circle cx="46" cy="32" r="12" fill="url(#goldLeaves)" stroke="#8C6B14" stroke-width="0.75" />
</svg>
